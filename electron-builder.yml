appId: com.launchpad.app
productName: Launchpad
copyright: Copyright © 2025 Prince Jain

directories:
  buildResources: resources
  output: release

files:
  - dist
  - dist-electron
  - apps.json

extraResources:
  - from: apps.json
    to: apps.json
  - from: resources/trayIconTemplate.png
    to: trayIconTemplate.png
  - from: resources/trayIconTemplate@2x.png
    to: trayIconTemplate@2x.png
  - from: resources/icon.png
    to: icon.png

mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.developer-tools
  icon: resources/icon.png
  identity: null

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: true
  artifactName: "${productName}.Setup.${version}.${ext}"

publish:
  - provider: github
    owner: product-noob
    repo: launchpad-app
