<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OG Image Template</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .container {
      display: flex;
      align-items: center;
      gap: 80px;
      padding: 0 80px;
      width: 100%;
    }
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #a1a1aa;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo span {
      font-size: 24px;
    }
    h1 {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    h1 .highlight {
      background: linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 20px;
      color: #a1a1aa;
      line-height: 1.5;
    }
    .badges {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }
    .badge {
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #d4d4d8;
    }
    /* Mini app mockup */
    .mockup {
      width: 320px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }
    .mockup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .mockup-title {
      font-size: 14px;
      font-weight: 700;
      color: #e4e4e7;
    }
    .mockup-count {
      font-size: 11px;
      color: #71717a;
    }
    .app-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.6); }
    .dot.green2 { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.6); }
    .dot.gray { background: #52525b; }
    .app-name {
      font-size: 13px;
      font-weight: 600;
      color: #e4e4e7;
      flex: 1;
    }
    .app-type {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      text-transform: uppercase;
    }
    .type-vite { color: #a78bfa; background: rgba(167,139,250,0.1); }
    .type-fastapi { color: #34d399; background: rgba(52,211,153,0.1); }
    .type-next { color: #60a5fa; background: rgba(96,165,250,0.1); }
    .type-streamlit { color: #f472b6; background: rgba(244,114,182,0.1); }
    .app-port {
      font-size: 11px;
      color: #71717a;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="logo"><span>🚀</span> Launchpad</div>
      <h1>Your dev servers,<br/><span class="highlight">one click away.</span></h1>
      <p class="tagline">Start, stop, and monitor every local server<br/>from a single menu bar app.</p>
      <div class="badges">
        <span class="badge">macOS</span>
        <span class="badge">Windows</span>
        <span class="badge">Open Source</span>
      </div>
    </div>
    <div class="mockup">
      <div class="mockup-header">
        <span class="mockup-title">My Apps</span>
        <span class="mockup-count">3 running</span>
      </div>
      <div class="app-row">
        <div class="dot green"></div>
        <span class="app-name">Dashboard</span>
        <span class="app-type type-vite">Vite</span>
        <span class="app-port">:5173</span>
      </div>
      <div class="app-row">
        <div class="dot green2"></div>
        <span class="app-name">API Server</span>
        <span class="app-type type-fastapi">FastAPI</span>
        <span class="app-port">:8000</span>
      </div>
      <div class="app-row">
        <div class="dot green"></div>
        <span class="app-name">Blog</span>
        <span class="app-type type-next">Next.js</span>
        <span class="app-port">:3000</span>
      </div>
      <div class="app-row">
        <div class="dot gray"></div>
        <span class="app-name">Analytics</span>
        <span class="app-type type-streamlit">Streamlit</span>
        <span class="app-port">:8501</span>
      </div>
    </div>
  </div>
</body>
</html>
