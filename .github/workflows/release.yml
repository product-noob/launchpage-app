name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Create release and upload DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "Launchpad ${{ github.ref_name }} -macOS and Windows tray app for managing local dev servers." \
            2>/dev/null || true
          gh release upload ${{ github.ref_name }} release/*.dmg --clobber

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --publish never

      - name: Upload installer to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes "Launchpad ${{ github.ref_name }} -macOS and Windows tray app for managing local dev servers." \
            2>/dev/null || true
          gh release upload ${{ github.ref_name }} release/*.exe --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  winget-submit:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: Submit update to winget
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $installerUrl = "https://github.com/product-noob/launchpad-app/releases/download/${{ github.ref_name }}/Launchpad.Setup.$version.exe"

          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

          .\wingetcreate.exe update PrinceJain.Launchpad `
            --version $version `
            --urls $installerUrl `
            --submit `
            --token $env:WINGET_TOKEN
