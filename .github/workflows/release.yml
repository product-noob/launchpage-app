name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never

      - name: Create release and upload DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.RELEASE_TAG }} \
            --title "${{ env.RELEASE_TAG }}" \
            --notes "Launchpad ${{ env.RELEASE_TAG }} -macOS and Windows tray app for managing local dev servers." \
            2>/dev/null || true
          gh release upload ${{ env.RELEASE_TAG }} release/*.dmg --clobber

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --publish never

      - name: Upload installer to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ env.RELEASE_TAG }} \
            --title "${{ env.RELEASE_TAG }}" \
            --notes "Launchpad ${{ env.RELEASE_TAG }} -macOS and Windows tray app for managing local dev servers." \
            2>/dev/null || true
          gh release upload ${{ env.RELEASE_TAG }} release/*.exe --clobber

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  winget-submit:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: Submit update to winget
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_TAG }}" -replace '^v', ''
          $installerUrl = "https://github.com/product-noob/launchpad-app/releases/download/${{ env.RELEASE_TAG }}/Launchpad.Setup.$version.exe"

          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe

          .\wingetcreate.exe update PrinceJain.Launchpad `
            --version $version `
            --urls $installerUrl `
            --submit `
            --token $env:WINGET_TOKEN
